<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240" role="img" aria-label="HELIOS">
  <title>heliosDB</title>
  <defs>
    <linearGradient id="sunFire" x1="0%" y1="0%" x2="0%" y2="100%">
